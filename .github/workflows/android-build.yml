name: KAIDA Animate Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter create --platforms=android .

    # Force Android SDK 24 requirement for FFmpeg compatibility
    - run: |
        if [ -f android/app/build.gradle ]; then
          sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle
        elif [ -f android/app/build.gradle.kts ]; then
          sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle.kts
        fi

    - run: flutter pub get

    # THE FIX: Inject official overrides directly into local.properties
    # This forces the plugin to use the stable 6.0 artifact and the min-gpl package.
    - run: |
        echo "ffmpegKitPackage=min-gpl" >> android/local.properties
        echo "ffmpegKitVersion=6.0" >> android/local.properties

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: KAIDA-Animate-APK
        path: build/app/outputs/flutter-apk/app-release.apk
