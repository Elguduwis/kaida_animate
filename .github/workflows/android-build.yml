name: KAIDA Animate Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter create --platforms=android .

    # FIX: Bump compileSdk to 36 to satisfy the latest Flutter Android plugins
    - run: |
        if [ -f android/app/build.gradle ]; then
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/g' android/app/build.gradle
        elif [ -f android/app/build.gradle.kts ]; then
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/g' android/app/build.gradle.kts
        fi

    - run: flutter pub get

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: KAIDA-Animate-APK
        path: build/app/outputs/flutter-apk/app-release.apk
