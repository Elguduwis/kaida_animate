name: KAIDA Animate Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter create --platforms=android .

    - run: flutter pub get

    # THE DEFINITIVE OVERRIDE: Using safe echo appends to avoid Bash indentation errors
    - run: |
        if [ -f android/build.gradle ]; then
          echo "" >> android/build.gradle
          echo "allprojects {" >> android/build.gradle
          echo "    configurations.all {" >> android/build.gradle
          echo "        resolutionStrategy {" >> android/build.gradle
          echo "            force 'com.arthenica:ffmpeg-kit-https:5.1.LTS'" >> android/build.gradle
          echo "        }" >> android/build.gradle
          echo "    }" >> android/build.gradle
          echo "}" >> android/build.gradle
        elif [ -f android/build.gradle.kts ]; then
          echo "" >> android/build.gradle.kts
          echo "allprojects {" >> android/build.gradle.kts
          echo "    configurations.all {" >> android/build.gradle.kts
          echo "        resolutionStrategy {" >> android/build.gradle.kts
          echo "            force(\"com.arthenica:ffmpeg-kit-https:5.1.LTS\")" >> android/build.gradle.kts
          echo "        }" >> android/build.gradle.kts
          echo "    }" >> android/build.gradle.kts
          echo "}" >> android/build.gradle.kts
        fi

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: KAIDA-Animate-APK
        path: build/app/outputs/flutter-apk/app-release.apk
