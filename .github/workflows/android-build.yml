name: KAIDA Animate Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter create --platforms=android .

    # 1. Official FFmpeg configuration to bypass the missing 6.0-2 Maven artifact
    # We force Gradle to pull the stable 6.0 version and use the lightweight min-gpl package.
    - run: |
        echo "ffmpegKitPackage=min-gpl" >> android/gradle.properties
        echo "ffmpegKitVersion=6.0" >> android/gradle.properties

    # 2. Force Android SDK 24 requirement for FFmpeg compatibility (Supports both Gradle DSLs)
    - run: |
        if [ -f android/app/build.gradle ]; then
          sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle
        elif [ -f android/app/build.gradle.kts ]; then
          sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle.kts
        fi

    - run: flutter pub get

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: KAIDA-Animate-APK
        path: build/app/outputs/flutter-apk/app-release.apk
