name: KAIDA Animate Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 1. Use latest stable Flutter. This automatically fixes the SDK 34 path_provider error.
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter create --platforms=android .

    - run: flutter pub get

    # 2. THE ARCHITECTURE OVERRIDE
    # We forcefully intercept the broken plugin request and point it to the stable LTS artifact.
    - run: |
        if [ -f android/build.gradle ]; then
          cat << 'GRADLE_EOF' >> android/build.gradle

          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'com.arthenica:ffmpeg-kit-https:5.1.LTS'
                  }
              }
          }
          GRADLE_EOF
        elif [ -f android/build.gradle.kts ]; then
          cat << 'KTS_EOF' >> android/build.gradle.kts

          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force("com.arthenica:ffmpeg-kit-https:5.1.LTS")
                  }
              }
          }
          KTS_EOF
        fi

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: KAIDA-Animate-APK
        path: build/app/outputs/flutter-apk/app-release.apk
