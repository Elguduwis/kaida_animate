name: KAIDA Animate Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # LOCK FLUTTER TO 3.16.9
    # This specifically avoids the fatal "namespace" error on ffmpeg 5.1.0
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'

    - run: flutter create --platforms=android .

    # THE ULTIMATE NATIVE FIX
    # We natively instruct Flutter to use SDK 34 for path_provider,
    # and SDK 24 for ffmpeg. No script patching required.
    - run: |
        echo "flutter.compileSdkVersion=34" >> android/local.properties
        echo "flutter.targetSdkVersion=34" >> android/local.properties
        echo "flutter.minSdkVersion=24" >> android/local.properties

    - run: flutter pub get

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: KAIDA-Animate-APK
        path: build/app/outputs/flutter-apk/app-release.apk
